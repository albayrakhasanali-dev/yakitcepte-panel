services:
  - type: web
    name: yakitcepte-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && node src/db/seed.js
    startCommand: node src/index.js
    envVars:
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
